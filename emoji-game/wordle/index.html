<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#17251f" />
    <meta name="description" content="Wordle — đoán từ tiếng Anh 5 chữ cái trong 6 lượt." />
    <title>Wordle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../doan-thanh-ngu/styles.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="../guide.css" />
  </head>
  <body>
    <div class="app">
      <header><a class="brand" href="../"><span>🔠</span><strong>Wordle</strong></a><div class="header-actions"><button class="icon-button" id="shareGameButton" aria-label="Chia sẻ game">↗</button><div class="best-score">Kỷ lục <strong id="bestScore">0</strong></div></div></header>
      <main>
        <section class="screen welcome active" id="welcomeScreen"><div class="hero-icons"><span>W</span><span>🔠</span><span>5</span></div><p class="eyebrow">5 chữ cái · 6 lượt đoán</p><h1>Đoán từ trong 6 lượt.</h1><p class="intro">Màu xanh là đúng vị trí, màu vàng là có chữ nhưng sai vị trí. Từ dùng tiếng Anh phổ biến.</p><button class="primary-button" id="startButton">Bắt đầu <span>→</span></button><button class="secondary-button" id="welcomeShareButton">Chia sẻ game <span>↗</span></button></section>
        <section class="screen game" id="gameScreen"><div class="game-head"><span id="turnText">Lượt 1/6</span><span>Điểm <strong id="scoreText">0</strong></span></div><div class="wordle-board" id="board"></div><div class="keyboard" id="keyboard"></div><button class="secondary-button" id="newButton">Từ khác</button></section>
        <section class="screen result" id="resultScreen"><div class="result-icon" id="resultIcon">🏆</div><p class="eyebrow">Kết quả</p><h2 id="resultTitle">Đoán tốt đấy!</h2><div class="score-panel"><span>Đáp án</span><strong id="answerText">APPLE</strong><small id="scoreLine">0 điểm</small></div><button class="primary-button" id="shareResultButton">Thách bạn bè <span>↗</span></button><button class="secondary-button" id="replayButton">Chơi từ khác</button></section>
      </main>
      <footer><a href="../">← Về cổng game</a><span>Wordle tiếng Anh</span></footer>
    </div>
    <div class="toast" id="toast" role="status"></div>
    <script src="../word-bank-1000.js"></script>
    <script src="app.js"></script>
    <script src="../guide.js"></script>
      <script src="../game-hub-integration.js"></script>
  </body>
</html>
